name: Test and deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 20
    env:
      HUGO_VERSION: 0.126.2
      BASE_URL: https://bbhtt.in
    steps:
      - name: Restore cached Hugo
        # 5.0.5
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        id: cache-hugo
        with:
          path: ${{ runner.temp }}/hugo.deb
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Download Hugo
        run: |
          if [ ! -f "${{ runner.temp }}/hugo.deb" ]; then
            wget -O "${{ runner.temp }}/hugo.deb" \
              "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          fi

      - name: Save Hugo cache
        # 5.0.5
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request' && steps.cache-hugo.outputs.cache-hit != 'true'
        with:
          path: ${{ runner.temp }}/hugo.deb
          key: hugo-${{ runner.os }}-${{ env.HUGO_VERSION }}

      - name: Install Hugo CLI
        run: |
          sudo dpkg -i "${{ runner.temp }}/hugo.deb"

      - name: Checkout repository
        # 6.0.2
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Setupp pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        id: pages
        # 6.0.0
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d

      - name: Build
        env:
          HUGO_ENVIRONMENT: production
        run: |
          hugo --minify --baseURL "$BASE_URL"

      - name: Upload artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        # 5.0.0
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9
        with:
          path: ./public

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    timeout-minutes: 20
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        # 5.0.0
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128
